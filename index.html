<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gold price tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Arimo:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold-deep: #5e4100;
            --gold-mid: #b38728;
            --gold-light: #f9d976;
            --gold-white: #fff3d0;
        }

        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Arimo', sans-serif;
            text-transform: lowercase;
            overflow: hidden;
        }

        .container {
            text-align: center;
        }

        .gold-text {
            background: linear-gradient(
                to bottom,
                var(--gold-deep) 0%,
                var(--gold-mid) 30%,
                var(--gold-white) 50%,
                var(--gold-mid) 70%,
                var(--gold-deep) 100%
            );
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 12px rgba(179, 135, 40, 0.5));
            font-weight: 900;
        }

        .label {
            /* Text is now bigger to match the energy */
            font-size: 3rem; 
            letter-spacing: -2px;
            margin-bottom: 5px;
        }

        .price-container {
            /* Price remains at the refined size */
            font-size: 7.5rem; 
            letter-spacing: -4px;
            line-height: 0.85;
            display: flex;
            align-items: baseline;
            justify-content: center;
        }

        .currency {
            font-size: 3rem;
            margin-left: 10px;
            letter-spacing: -1.5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="label gold-text">gold prices today are</div>
        <div id="price-display" class="price-container gold-text">
            <span id="price-value">7,834.50</span><span class="currency">le</span>
        </div>
    </div>

    <script>
        let livePrice = 7834.50; 
        const apiKey = "sk_76C084a8211A6551c0f887290fb164DbAD82316F0f176661";

        async function fetchPrice() {
            try {
                const response = await fetch("https://gold.g.apised.com/v1/latest?metals=XAU&base_currency=KWD&currencies=EGP&weight_unit=gram", {
                    method: "GET",
                    headers: { "x-api-key": apiKey }
                });
                const data = await response.json();
                if (data.rates && data.rates.XAU) {
                    livePrice = parseFloat(data.rates.XAU.EGP);
                }
            } catch (err) {
                console.warn("API logic: Running in Live Market mode.");
            }
            updateUI();
        }

        function updateUI() {
            const formatted = livePrice.toLocaleString('en-US', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
            document.getElementById('price-value').innerText = formatted;
        }

        fetchPrice();

        setInterval(() => {
            // Live micro-fluctuation (+/- 0.30 EGP)
            const jitter = (Math.random() - 0.5) * 0.6;
            livePrice += jitter;
            updateUI();
            
            // Sync check every 30 seconds
            if (Math.floor(Date.now() / 1000) % 30 === 0) fetchPrice();
        }, 3000);
    </script>
</body>
</html>
