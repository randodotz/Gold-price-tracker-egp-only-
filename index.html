<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gold price tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Arimo:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold-deep: #5e4100;
            --gold-mid: #b38728;
            --gold-light: #f9d976;
            --gold-white: #fff3d0;
        }

        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Arimo', sans-serif;
            text-transform: lowercase;
            overflow: hidden;
            color: white;
        }

        .container { text-align: center; }

        .gold {
            background: linear-gradient(to bottom, var(--gold-deep) 0%, var(--gold-mid) 30%, var(--gold-white) 50%, var(--gold-mid) 70%, var(--gold-deep) 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 12px rgba(179, 135, 40, 0.5));
            font-weight: 900;
        }

        .label {
            font-size: 3rem;
            letter-spacing: -2px;
            margin-bottom: 5px;
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 0.3ch;
        }

        .trigger-wrapper { position: relative; display: inline-block; }
        #karat-selector-trigger { text-decoration: underline; cursor: pointer; display: inline-block; }

        #karat-menu {
            position: absolute; top: 0; right: calc(100% + 20px); 
            display: flex; flex-direction: row; align-items: center; gap: 15px;
            padding: 10px 20px; border: 1px solid var(--gold-mid);
            background: rgba(0, 0, 0, 0.9); border-radius: 50px;
            opacity: 0; visibility: hidden; pointer-events: none;
            transform: translateX(30px); transition: 0.4s; z-index: 100;
        }

        #karat-menu.active { opacity: 1; visibility: visible; pointer-events: auto; transform: translateX(0); }
        .karat-option { font-size: 1.2rem; cursor: pointer; opacity: 0.6; transition: 0.2s; }
        .karat-option:hover { opacity: 1; transform: scale(1.2); }

        .price-container { font-size: 7.5rem; letter-spacing: -4px; line-height: 0.85; display: flex; align-items: baseline; justify-content: center; }
        .currency { font-size: 3rem; margin-left: 10px; letter-spacing: -1.5px; }

        .notify-btn {
            margin-top: 30px; padding: 12px 30px; background: transparent;
            border: 1px solid var(--gold-mid); border-radius: 50px;
            cursor: pointer; font-family: 'Arimo', sans-serif; font-size: 1rem;
            color: var(--gold-light); transition: all 0.3s;
        }

        .notify-btn.gold { -webkit-text-fill-color: var(--gold-light) !important; color: var(--gold-light) !important; }
        .notify-btn:hover { background: var(--gold-mid); color: #000 !important; -webkit-text-fill-color: #000 !important; }

        .modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(10, 10, 10, 0.95); border: 1.5px solid var(--gold-mid);
            padding: 30px; border-radius: 15px; z-index: 1000; width: 90%; max-width: 400px;
            box-shadow: 0 0 30px rgba(179, 135, 40, 0.3);
        }
        .modal.active { display: block; }
        .modal input, .modal select {
            background: #111; border: 1px solid rgba(179, 135, 40, 0.5);
            color: var(--gold-white); padding: 12px; margin: 8px 0 20px 0;
            width: 100%; border-radius: 8px; outline: none;
        }
        .modal label { display: block; text-align: left; font-size: 0.9rem; color: var(--gold-mid); }
        .status-tag { font-size: 1rem; margin-top: 15px; color: var(--gold-light); display: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="label">
        <span class="trigger-wrapper">
            <div id="karat-menu">
                <span class="karat-option gold" onclick="selectKarat(24)">24k</span>
                <span class="karat-option gold" onclick="selectKarat(22)">22k</span>
                <span class="karat-option gold" onclick="selectKarat(21)">21k</span>
                <span class="karat-option gold" onclick="selectKarat(18)">18k</span>
                <span class="karat-option gold" onclick="selectKarat(14)">14k</span>
            </div>
            <span id="karat-selector-trigger" class="gold" onclick="toggleMenu(event)">24k</span>
        </span>
        <span class="gold" style="text-transform: none;">Gold price today is</span>
    </div>

    <div class="price-container">
        <span id="price-value" class="gold">7,834.50</span><span class="currency gold">le</span>
    </div>

    <button class="notify-btn gold" id="main-notify-btn" onclick="handleNotifyClick()">set alert</button>
    <div id="alert-status" class="status-tag" onclick="clearAlert()">alert active... (click to cancel)</div>
</div>

<div id="notifyModal" class="modal">
    <h3 class="gold">alert settings</h3>
    <label>target price (le) - rings if equal or higher</label>
    <input type="number" id="targetPrice" step="0.01">
    <label>select karat</label>
    <select id="targetKarat">
        <option value="24">24k</option>
        <option value="22">22k</option>
        <option value="21">21k</option>
        <option value="18">18k</option>
        <option value="14">14k</option>
    </select>
    <label>require rechecks</label>
    <input type="number" id="targetChecks" value="5">
    <button class="notify-btn gold" onclick="setNotification()">save alert</button>
    <button class="notify-btn" style="border:none; color: #888;" onclick="closeModal()">cancel</button>
</div>

<script>
    // Register Service Worker for System Notifications (Cross-platform support)
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('data:text/javascript;base64,' + btoa('self.addEventListener("push", e => {});'));
    }

    let base24kPrice = 7834.50;
    let currentKarat = 24;
    const apiKey = "sk_76C084a8211A6551c0f887290fb164DbAD82316F0f176661";

    let alertActive = false;
    let targetPrice = 0;
    let targetKarat = 24;
    let requiredHits = 5;
    let hitCounter = 0;

    async function refreshBasePrice() {
        try {
            const response = await fetch("https://gold.g.apised.com/v1/latest?metals=XAU&base_currency=KWD&currencies=EGP&weight_unit=gram", {
                method: "GET",
                headers: { "x-api-key": apiKey }
            });
            const data = await response.json();
            if (data.rates && data.rates.XAU) {
                base24kPrice = parseFloat(data.rates.XAU.EGP);
            }
        } catch (err) { console.warn("API Offline"); }
    }

    function updateUI() {
        const price = base24kPrice * (currentKarat / 24);
        document.getElementById('price-value').innerText = price.toLocaleString('en-US', {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2
        });
        checkAlertCondition();
    }

    function checkAlertCondition() {
        if (!alertActive) return;
        const currentAlertPrice = base24kPrice * (targetKarat / 24);
        
        if (currentAlertPrice >= parseFloat(targetPrice)) {
            hitCounter++;
            if (hitCounter >= requiredHits) {
                sendSystemNotification(currentAlertPrice);
                clearAlert(); 
            }
        } else { hitCounter = 0; }
    }

    async function sendSystemNotification(price) {
        const title = "Gold Price Alert!";
        const options = {
            body: `${targetKarat}k Gold is now ${price.toFixed(2)} le!`,
            icon: 'https://cdn-icons-png.flaticon.com/512/261/261835.png',
            vibrate: [200, 100, 200],
            requireInteraction: true 
        };

        if (Notification.permission === "granted") {
            const reg = await navigator.serviceWorker.ready;
            reg.showNotification(title, options);
        }
    }

    function handleNotifyClick() {
        // If permission is already granted, just open the modal
        if (Notification.permission === "granted") {
            openModal();
        } else {
            // Otherwise, request permission once
            Notification.requestPermission().then(permission => {
                if (permission === "granted") openModal();
                else alert("Notifications are blocked. Please enable them in browser settings.");
            });
        }
    }

    function setNotification() {
        targetPrice = document.getElementById('targetPrice').value;
        targetKarat = document.getElementById('targetKarat').value;
        requiredHits = parseInt(document.getElementById('targetChecks').value);

        if (!targetPrice) return alert("Enter price");

        const alertData = { targetPrice, targetKarat, requiredHits };
        localStorage.setItem('goldAlert', JSON.stringify(alertData));
        
        activateAlert(alertData);
        closeModal();
    }

    function loadSavedAlert() {
        const saved = localStorage.getItem('goldAlert');
        if (saved) {
            const alertData = JSON.parse(saved);
            activateAlert(alertData);
        }
    }

    function activateAlert(data) {
        targetPrice = data.targetPrice;
        targetKarat = data.targetKarat;
        requiredHits = data.requiredHits;
        alertActive = true;
        hitCounter = 0;
        
        const status = document.getElementById('alert-status');
        status.innerText = `watching for ${targetKarat}k >= ${targetPrice} le... (click to cancel)`;
        status.style.display = 'block';
        document.getElementById('main-notify-btn').style.display = 'none';
    }

    function clearAlert() {
        alertActive = false;
        localStorage.removeItem('goldAlert');
        document.getElementById('alert-status').style.display = 'none';
        document.getElementById('main-notify-btn').style.display = 'inline-block';
    }

    function openModal() { document.getElementById('notifyModal').classList.add('active'); }
    function closeModal() { document.getElementById('notifyModal').classList.remove('active'); }
    function toggleMenu(e) { e.stopPropagation(); document.getElementById('karat-menu').classList.toggle('active'); }
    function selectKarat(k) {
        currentKarat = k;
        document.getElementById('karat-selector-trigger').innerText = k + 'k';
        document.getElementById('karat-menu').classList.remove('active');
        updateUI();
    }

    window.onclick = () => document.getElementById('karat-menu').classList.remove('active');

    // Startup Logic
    loadSavedAlert();
    refreshBasePrice();
    setInterval(() => { base24kPrice += (Math.random() - 0.5) * 0.4; updateUI(); }, 3000);
    setInterval(refreshBasePrice, 30000);
</script>
</body>
</html>
