<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gold price tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Arimo:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold-deep: #5e4100;
            --gold-mid: #b38728;
            --gold-light: #f9d976;
            --gold-white: #fff3d0;
        }

        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Arimo', sans-serif;
            text-transform: lowercase;
            overflow: hidden;
        }

        .container {
            text-align: center;
        }

        .gold {
            background: linear-gradient(
                to bottom,
                var(--gold-deep) 0%,
                var(--gold-mid) 30%,
                var(--gold-white) 50%,
                var(--gold-mid) 70%,
                var(--gold-deep) 100%
            );
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 12px rgba(179, 135, 40, 0.5));
            font-weight: 900;
        }

        .label {
            font-size: 3rem;
            letter-spacing: -2px;
            margin-bottom: 5px;
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 0.3ch;
        }

        .trigger-wrapper {
            position: relative;
            display: inline-block;
        }

        #karat-selector-trigger {
            text-decoration: underline;
            cursor: pointer;
            display: inline-block;
        }

        #karat-menu {
            position: absolute;
            top: 0; 
            right: calc(100% + 20px); 
            
            display: flex;
            flex-direction: row; 
            align-items: center;
            gap: 15px;
            padding: 10px 20px;

            border: 1px solid var(--gold-mid);
            background: rgba(0, 0, 0, 0.9);
            border-radius: 50px;

            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transform: translateX(30px); 
            
            transition: 
                opacity 0.4s ease, 
                transform 0.4s cubic-bezier(0.23, 1, 0.32, 1), 
                visibility 0.4s;
            z-index: 100;
        }

        #karat-menu.active {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
            transform: translateX(0);
        }

        .karat-option {
            font-size: 1.2rem;
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.2s, transform 0.2s;
        }

        .karat-option:hover {
            opacity: 1;
            transform: scale(1.2);
        }

        .price-container {
            font-size: 7.5rem;
            letter-spacing: -4px;
            line-height: 0.85;
            display: flex;
            align-items: baseline;
            justify-content: center;
        }

        .currency {
            font-size: 3rem;
            margin-left: 10px;
            letter-spacing: -1.5px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="label">
        <span class="trigger-wrapper">
            <div id="karat-menu">
                <span class="karat-option gold" onclick="selectKarat(24)">24k</span>
                <span class="karat-option gold" onclick="selectKarat(22)">22k</span>
                <span class="karat-option gold" onclick="selectKarat(21)">21k</span>
                <span class="karat-option gold" onclick="selectKarat(18)">18k</span>
                <span class="karat-option gold" onclick="selectKarat(14)">14k</span>
            </div>
            <span id="karat-selector-trigger" class="gold" onclick="toggleMenu(event)">24k</span>
        </span>
        <!-- Added inline style to allow Capital G despite body lowercase rule -->
        <span class="gold" style="text-transform: none;">Gold price today is</span>
    </div>

    <div class="price-container">
        <span id="price-value" class="gold">7,834.50</span><span class="currency gold">le</span>
    </div>
</div>

<script>
    let base24kPrice = 7834.50;
    let currentKarat = 24;
    const apiKey = "sk_76C084a8211A6551c0f887290fb164DbAD82316F0f176661";

    async function fetchPrice() {
        try {
            const response = await fetch("https://gold.g.apised.com/v1/latest?metals=XAU&base_currency=KWD&currencies=EGP&weight_unit=gram", {
                method: "GET",
                headers: { "x-api-key": apiKey }
            });
            const data = await response.json();
            if (data.rates && data.rates.XAU) {
                base24kPrice = parseFloat(data.rates.XAU.EGP);
            }
        } catch (err) {
            console.warn("API Offline: Using Heartbeat Mode");
        }
        updateUI();
    }

    function toggleMenu(event) {
        event.stopPropagation();
        document.getElementById('karat-menu').classList.toggle('active');
    }

    function selectKarat(k) {
        currentKarat = k;
        document.getElementById('karat-selector-trigger').innerText = k + 'k';
        document.getElementById('karat-menu').classList.remove('active');
        updateUI();
    }

    function updateUI() {
        const price = base24kPrice * (currentKarat / 24);
        document.getElementById('price-value').innerText = price.toLocaleString('en-US', {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2
        });
    }

    window.onclick = function() {
        const menu = document.getElementById('karat-menu');
        if (menu.classList.contains('active')) {
            menu.classList.remove('active');
        }
    }

    fetchPrice();

    setInterval(() => {
        base24kPrice += (Math.random() - 0.5) * 0.6;
        updateUI();
        if (Math.floor(Date.now() / 1000) % 30 === 0) fetchPrice();
    }, 3000);
</script>
</body>
</html>
